site_name: Aegis Spec
site_url: https://wellbrito29.github.io/Aegis
site_description: Executable specifications and guardrails for AI-assisted software evolution.
site_author: Wellbrito29
repo_url: https://github.com/Wellbrito29/Aegis
repo_name: Wellbrito29/Aegis
edit_uri: edit/main/docs/
copyright: '"Aegis Spec" by Wellbrito29 — fork of Reversa by sandeco'

theme:
  name: material
  language: pt-BR
  palette:
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mudar para modo claro
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mudar para modo escuro
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - content.tooltips
  icon:
    repo: fontawesome/brands/github
    logo: material/magnify

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang:
        - pt
        - en
  - i18n:
      docs_structure: suffix
      languages:
        - locale: en
          default: true
          name: English
        - locale: pt
          name: Português
          build: true
          nav_translations:
            Home: Início
            Why Aegis Spec: Por que o Aegis Spec
            Installation: Instalação
            How to use: Como usar
            CLI: CLI
            Configuration: Configuração
            Supported engines: Engines suportadas
            Analysis pipeline: Pipeline de análise
            Confidence scale: Escala de confiança
            Agents: Agentes
            Overview: Visão geral
            Guide with analogies: Guia com analogias
            Aegis Spec (Orchestrator): Aegis Spec (Orquestrador)
            Forward cycle: Ciclo forward
            Requirements: Requirements
            Tech Brief: Tech Brief
            Doubt: Doubt
            Plan: Plan
            To-Do: To-Do
            Audit: Audit
            Quality: Quality
            Coding: Coding
            Principles: Principles
            Translators: Tradutores
            N8N Translator: N8N Translator
            Generated outputs: Saídas geradas
            Developing from specs: Desenvolvendo com as specs
            Migration: Migração
            The 5 agents: Os 5 agentes
            Paradigm shift: Mudança de paradigma
