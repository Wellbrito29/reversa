            Contributing: Contribuindo
            Drift loop: Ciclo de drift
            Hooks (auto Keeper): Hooks (Keeper automático)
            drift-check (CI gate): drift-check (CI gate)
        - locale: es
          name: Español
          build: true
          nav_translations:
