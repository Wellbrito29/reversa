            Supported engines: Motores compatibles
            Analysis pipeline: Pipeline de análisis
            Confidence scale: Escala de confianza
            Agents: Agentes
            Overview: Visión general
            Guide with analogies: Guía con analogías
            Aegis Spec (Orchestrator): Aegis Spec (Orquestador)
            Forward cycle: Ciclo forward
            Requirements: Requirements
            Tech Brief: Tech Brief
            Doubt: Doubt
            Plan: Plan
            To-Do: To-Do
            Audit: Audit
            Quality: Quality
            Coding: Coding
            Principles: Principles
            Translators: Traductores
            N8N Translator: N8N Translator
            Generated outputs: Salidas generadas
            Developing from specs: Desarrollando con las specs
            Migration: Migración
            The 5 agents: Los 5 agentes
            Paradigm shift: Cambio de paradigma
