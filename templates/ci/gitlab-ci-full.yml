# Reversa control plane — full GitLab CI snippet.
#
# Drop into your `.gitlab-ci.yml` (or include via `include:`). Three jobs run
# on merge requests: drift-check, policy-check, keeper-auto. The auto job is
# gated by the ANTHROPIC_API_KEY variable; without it the job is skipped.

stages:
  - quality
  - keeper

reversa:drift-check:
  image: node:20
  stage: quality
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - npx reversa drift-check --severity high --format text

reversa:policy-check:
  image: node:20
  stage: quality
  needs: ["reversa:drift-check"]
  variables:
    GIT_DEPTH: 0
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
    - npx reversa policy-index build
    - npx reversa policy-check
        --base "origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
        --head HEAD
        --severity high
        --format text

reversa:keeper-auto:
  image: node:20
  stage: keeper
  needs: ["reversa:policy-check"]
  variables:
    GIT_DEPTH: 0
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $ANTHROPIC_API_KEY'
  cache:
    key: aegis-graph-$CI_PROJECT_ID
    paths:
      - .aegis/context/graph.json
  script:
    - npx reversa keeper auto --format text --max-specs 5
    - |
      if [ -n "$(git status --porcelain _aegis_sdd)" ]; then
        git config user.name "aegis-keeper[bot]"
        git config user.email "aegis-keeper@users.noreply.gitlab.com"
        git add _aegis_sdd
        git commit -m "reversa(keeper): auto-update specs [skip ci]"
        git push "https://oauth2:${KEEPER_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" \
          "HEAD:${CI_COMMIT_REF_NAME}"
      fi
  artifacts:
    name: aegis-audit
    when: always
    paths:
      - .aegis/audit/
