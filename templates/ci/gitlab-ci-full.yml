# Aegis Spec control plane — full GitLab CI snippet.
#
# Drop into your `.gitlab-ci.yml` (or include via `include:`). Three jobs run
# on merge requests: drift-check, policy-check, keeper-auto. The auto job is
# gated by the ANTHROPIC_API_KEY variable; without it the job is skipped.

stages:
  - quality
  - keeper

aegis-spec:drift-check:
  image: node:20
  stage: quality
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - npx aegis-spec drift-check --severity high --format text

aegis-spec:policy-check:
  image: node:20
  stage: quality
  needs: ["aegis-spec:drift-check"]
  variables:
    GIT_DEPTH: 0
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  script:
    - git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
    - npx aegis-spec policy-index build
    - npx aegis-spec policy-check
        --base "origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
        --head HEAD
        --severity high
        --format text

aegis-spec:keeper-auto:
  image: node:20
  stage: keeper
  needs: ["aegis-spec:policy-check"]
  variables:
    GIT_DEPTH: 0
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $ANTHROPIC_API_KEY'
  cache:
    key: aegis-graph-$CI_PROJECT_ID
    paths:
      - aegis/runtime/context/graph.json
  script:
    - npx aegis-spec keeper auto --format text --max-specs 5
    - |
      if [ -n "$(git status --porcelain aegis)" ]; then
        git config user.name "aegis-keeper[bot]"
        git config user.email "aegis-keeper@users.noreply.gitlab.com"
        git add aegis
        git commit -m "aegis-spec(keeper): auto-update specs [skip ci]"
        git push "https://oauth2:${KEEPER_PUSH_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git" \
          "HEAD:${CI_COMMIT_REF_NAME}"
      fi
  artifacts:
    name: aegis-audit
    when: always
    paths:
      - aegis/runtime/audit/
