# Reversa policy-check — GitHub Actions workflow.
#
# Drop into `.github/workflows/aegis-policy.yml`. Runs on every PR and
# blocks merge when a protected contract's signature breaks. Adjust
# `severity` to medium/low to also gate on protected-file edits without
# diff context (initial Phase 4 behaviour).
#
# Requires:
#   - Node 18+ (for `npx reversa`)
#   - `_aegis_sdd/sdd/` with frontmatter `contracts:` / `protected_files:`
#   - The PR base ref fetched (we set `fetch-depth: 0`)

name: aegis-policy

on:
  pull_request:
    branches: [main]

jobs:
  policy-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build policy index
        run: npx reversa policy-index build

      - name: Run policy-check
        run: |
          npx reversa policy-check \
            --base origin/${{ github.event.pull_request.base.ref }} \
            --head HEAD \
            --severity high \
            --format text
